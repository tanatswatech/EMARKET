<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Market</title>

  <!-- CONNECT CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">E-Market</h2>

  <input type="text" placeholder="Search products...">

  <div class="nav-links">
    <a href="#">Login</a>
    <a href="#">Register</a>
    <a href="#" class="seller-btn">Sell</a>
  </div>
</header>

<!-- SLIDER -->
<section class="slider">
  <div class="slide">ADD IMAGE</div>
  <div class="slide">ADD IMAGE</div>
  <div class="slide">ADD IMAGE</div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>🔥 Trending Products</h2>

  <div class="product-grid">

    <div class="product-card">
      <div class="img-box">IMAGE</div>
      <h3>Bike</h3>
      <p>$120</p>
      <button onclick="buyProduct()">Buy</button>
    </div>

  </div>
</section>

<!-- REELS -->
<section class="reels">
  <h2>📱 Reels</h2>

  <div class="reels-container">
    <div class="reel">REEL</div>
    <div class="reel">REEL</div>
  </div>
</section>

<!-- LOADING BAR -->
<div id="loadingBar"></div>

<!-- CONNECT JS -->
<script src="script.js"></script>

</body>
</html>
