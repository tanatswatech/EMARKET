<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Market</title>

  <!-- CONNECT CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">E-Market</h2>

  <input type="text" placeholder="Search products...">

  <div class="nav-links">
    <a href="login.html">Login</a>
<a href="register.html">Register</a>
<a href="seller-register.html" class="seller-btn">Sell</a>
  </div>
</header>

<!-- SLIDER -->
<div class="hero-wrapper">

  <div class="hero-overlay">
    <h1>Welcome to EMARKET</h1>
    <p>Shop Local & International Products</p>

    <button>Shop Now</button>
  </div>

  <div class="hero-track">

    <div class="hero-item"
      style="background-image:url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200');">
    </div>

    <div class="hero-item"
      style="background-image:url('https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200');">
    </div>

    <div class="hero-item"
      style="background-image:url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200');">
    </div>

    <div class="hero-item"
      style="background-image:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200');">
    </div>

  </div>

</div>
<!-- PRODUCTS -->
  <section class="categories">
  <button onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('bikes')">Bikes</button>
  <button onclick="filterProducts('electronics')">Electronics</button>
</section>
<section class="products">
  <h2>🔥 Trending Products</h2>
<div class="product-grid" id="productList">
</div>
 
</section>

<!-- REELS -->
<section class="reels">
  <h2>📱 Reels</h2>
  <div class="reels-container" id="reelList"></div>
</section>

<!-- LOADING BAR -->
<div id="loadingBar"></div>

<!-- CONNECT JS -->
  <script src="script.js?v=2"></script>
</body>
</html>
