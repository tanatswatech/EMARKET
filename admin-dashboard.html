<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>EMARKET ADMIN</title>

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      background:
      linear-gradient(
      135deg,
      #0a0a0a,
      #101820,
      #151515);

      color:white;

      overflow-x:hidden;

    }

    /* ======================
       DASHBOARD
    ====================== */

    .dashboard{

      display:flex;

      min-height:100vh;

    }

    /* ======================
       SIDEBAR
    ====================== */

    .sidebar{

      width:280px;

      background:
      rgba(0,0,0,0.6);

      backdrop-filter:blur(15px);

      border-right:
      1px solid rgba(255,255,255,0.08);

      padding:25px;

    }

    .logo{

      font-size:28px;

      font-weight:700;

      color:#ff6600;

      margin-bottom:40px;

      text-shadow:
      0 0 20px rgba(255,102,0,0.4);

    }

    .menu{

      display:flex;

      flex-direction:column;

      gap:15px;

    }

    .menu button{

      background:
      rgba(255,255,255,0.06);

      border:none;

      color:white;

      padding:16px;

      border-radius:16px;

      cursor:pointer;

      text-align:left;

      transition:0.3s;

      font-size:15px;

      font-weight:500;

    }

    .menu button:hover{

      background:
      linear-gradient(
      to right,
      #ff6600,
      #ff9900);

      transform:translateX(5px);

    }

    /* ======================
       MAIN
    ====================== */

    .main{

      flex:1;

      padding:30px;

    }

    .topbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:30px;

    }

    .topbar h1{

      font-size:32px;

    }

    .admin-badge{

      background:
      linear-gradient(
      to right,
      #ff6600,
      #ff9900);

      padding:10px 18px;

      border-radius:30px;

      font-weight:bold;

    }

    /* ======================
       STATS
    ====================== */

    .stats{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:35px;

    }

    .stat-card{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      border-radius:22px;

      padding:25px;

      transition:0.3s;

    }

    .stat-card:hover{

      transform:translateY(-8px);

      box-shadow:
      0 15px 40px rgba(255,102,0,0.25);

    }

    .stat-card h2{

      font-size:35px;

      color:#ff9900;

    }

    .stat-card p{

      color:#ccc;

      margin-top:10px;

    }

    /* ======================
       CONTENT AREA
    ====================== */

    .content-box{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      border-radius:25px;

      padding:25px;

      min-height:500px;

    }

    .content-title{

      font-size:28px;

      margin-bottom:25px;

      color:#ff9900;

    }

    /* ======================
       PRODUCTS GRID
    ====================== */

    .products{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));

      gap:20px;

    }

    .product{

      background:
      rgba(255,255,255,0.05);

      border-radius:20px;

      overflow:hidden;

      transition:0.3s;

    }

    .product:hover{

      transform:translateY(-8px);

    }

    .product img{

      width:100%;

      height:220px;

      object-fit:cover;

    }

    .product-info{

      padding:15px;

    }

    .product-info h3{

      margin-bottom:10px;

    }

    .price{

      color:#ff9900;

      font-weight:bold;

      margin-bottom:10px;

    }

    .seller{

      color:#bbb;

      font-size:14px;

      margin-bottom:10px;

    }

    .rating{

      color:gold;

    }

    /* ======================
       TABLES
    ====================== */

    table{

      width:100%;

      border-collapse:collapse;

    }

    table th,
    table td{

      padding:15px;

      text-align:left;

      border-bottom:
      1px solid rgba(255,255,255,0.08);

    }

    table th{

      color:#ff9900;

    }

    /* ======================
       MOBILE
    ====================== */

    @media(max-width:900px){

      .dashboard{

        flex-direction:column;

      }

      .sidebar{

        width:100%;

      }

    }

  </style>

</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      E-MARKET
    </div>

    <div class="menu">

      <button onclick="showSection('dashboard')">
        📊 Dashboard
      </button>

      <button onclick="showSection('products')">
        🛍 Products
      </button>

      <button onclick="showSection('orders')">
        📦 Orders
      </button>

      <button onclick="showSection('buyers')">
        👥 Buyers
      </button>

      <button onclick="showSection('sellers')">
        🏪 Sellers
      </button>

      <button onclick="showSection('audits')">
        🛡 Audits
      </button>

      <button onclick="showSection('payments')">
        💳 Payments
      </button>

      <button onclick="logoutAdmin()">
        🚪 Logout
      </button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <div class="topbar">

      <h1 id="pageTitle">
        Dashboard
      </h1>

      <div class="admin-badge">
        ADMIN PANEL
      </div>

    </div>

    <!-- STATS -->

    <div class="stats">

      <div class="stat-card">

        <h2>2,450</h2>

        <p>Total Users</p>

      </div>

      <div class="stat-card">

        <h2>1,240</h2>

        <p>Total Orders</p>

      </div>

      <div class="stat-card">

        <h2>$84K</h2>

        <p>Total Sales</p>

      </div>

      <div class="stat-card">

        <h2>540</h2>

        <p>Sellers</p>

      </div>

    </div>

    <!-- CONTENT -->

    <div class="content-box">

      <h2 class="content-title"
        id="contentTitle">

        Featured Products

      </h2>

      <div id="contentArea">

        <!-- PRODUCTS -->

        <div class="products">

          <div class="product">

            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

            <div class="product-info">

              <h3>Nike Air Max</h3>

              <div class="price">
                $120
              </div>

              <div class="seller">
                Seller: Tanatswa Tech
              </div>

              <div class="rating">
                ⭐⭐⭐⭐⭐
              </div>

            </div>

          </div>

          <div class="product">

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

            <div class="product-info">

              <h3>iPhone 15 Pro</h3>

              <div class="price">
                $1400
              </div>

              <div class="seller">
                Seller: Mobile World
              </div>

              <div class="rating">
                ⭐⭐⭐⭐⭐
              </div>

            </div>

          </div>

          <div class="product">

            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">

            <div class="product-info">

              <h3>Headphones</h3>

              <div class="price">
                $85
              </div>

              <div class="seller">
                Seller: Sound Tech
              </div>

              <div class="rating">
                ⭐⭐⭐⭐☆
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </main>

</div>

<script>

function showSection(section){

  const title =
    document.getElementById("pageTitle");

  const contentTitle =
    document.getElementById("contentTitle");

  const area =
    document.getElementById("contentArea");

  title.innerText =
    section.charAt(0).toUpperCase()
    + section.slice(1);

  contentTitle.innerText =
    section.charAt(0).toUpperCase()
    + section.slice(1);

  if(section === "buyers"){

    area.innerHTML = `

      <table>

        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>John Doe</td>
          <td>john@gmail.com</td>
          <td>Active</td>
        </tr>

        <tr>
          <td>Sarah</td>
          <td>sarah@gmail.com</td>
          <td>Active</td>
        </tr>

      </table>

    `;

  }

  else if(section === "orders"){

    area.innerHTML = `

      <table>

        <tr>
          <th>Order ID</th>
          <th>Product</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>#1045</td>
          <td>iPhone 15</td>
          <td>Delivered</td>
        </tr>

        <tr>
          <td>#1046</td>
          <td>Nike Air Max</td>
          <td>Pending</td>
        </tr>

      </table>

    `;

  }

  else if(section === "payments"){

    area.innerHTML = `

      <table>

        <tr>
          <th>Payment</th>
          <th>Method</th>
          <th>Amount</th>
        </tr>

        <tr>
          <td>#PAY-201</td>
          <td>Visa</td>
          <td>$1200</td>
        </tr>

        <tr>
          <td>#PAY-202</td>
          <td>EcoCash</td>
          <td>$320</td>
        </tr>

      </table>

    `;

  }

  else if(section === "audits"){

    area.innerHTML = `

      <table>

        <tr>
          <th>Action</th>
          <th>User</th>
          <th>Time</th>
        </tr>

        <tr>
          <td>Product Deleted</td>
          <td>Admin</td>
          <td>10:40 AM</td>
        </tr>

        <tr>
          <td>User Registered</td>
          <td>Sarah</td>
          <td>11:10 AM</td>
        </tr>

      </table>

    `;

  }

  else if(section === "sellers"){

    area.innerHTML = `

      <table>

        <tr>
          <th>Seller</th>
          <th>Shop</th>
          <th>Rating</th>
        </tr>

        <tr>
          <td>Tanatswa</td>
          <td>Tanatswa Tech</td>
          <td>⭐⭐⭐⭐⭐</td>
        </tr>

        <tr>
          <td>Mike</td>
          <td>Fashion Hub</td>
          <td>⭐⭐⭐⭐☆</td>
        </tr>

      </table>

    `;

  }

  else{

    area.innerHTML = `

      <div class="products">

        <div class="product">

          <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

          <div class="product-info">

            <h3>Nike Air Max</h3>

            <div class="price">$120</div>

            <div class="seller">
              Seller: Tanatswa Tech
            </div>

            <div class="rating">
              ⭐⭐⭐⭐⭐
            </div>

          </div>

        </div>

        <div class="product">

          <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

          <div class="product-info">

            <h3>iPhone 15 Pro</h3>

            <div class="price">$1400</div>

            <div class="seller">
              Seller: Mobile World
            </div>

            <div class="rating">
              ⭐⭐⭐⭐⭐
            </div>

          </div>

        </div>

      </div>

    `;

  }

}

function logoutAdmin(){

  window.location.href = "index.html";

}

</script>

</body>
</html>
