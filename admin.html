<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EMARKET ADMIN</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#0b0b0b,
#111827,
#151515
);

color:white;

display:flex;

min-height:100vh;

overflow:hidden;

}

/* =========================
   SIDEBAR
========================= */

.sidebar{

width:260px;

background:
rgba(0,0,0,0.5);

backdrop-filter:blur(14px);

padding:25px;

border-right:
1px solid rgba(255,255,255,0.08);

display:flex;
flex-direction:column;

}

.logo{

font-size:28px;

font-weight:700;

color:#ff6600;

margin-bottom:40px;

text-shadow:
0 0 18px rgba(255,102,0,0.6);

}

.menu{

display:flex;
flex-direction:column;
gap:14px;

}

.menu button{

background:
rgba(255,255,255,0.05);

border:none;

padding:16px;

border-radius:16px;

color:white;

font-size:15px;

display:flex;
align-items:center;
gap:12px;

cursor:pointer;

transition:0.3s;

}

.menu button:hover{

background:
linear-gradient(
to right,
#ff6600,
#ff9900
);

transform:translateX(5px);

}

/* =========================
   MAIN
========================= */

.main{

flex:1;

padding:25px;

overflow-y:auto;

}

/* TOP BAR */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

.topbar h1{

font-size:32px;

}

.admin-user{

display:flex;
align-items:center;
gap:12px;

background:
rgba(255,255,255,0.05);

padding:10px 16px;

border-radius:40px;

}

/* =========================
   STATS
========================= */

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.08);

border-radius:22px;

padding:22px;

backdrop-filter:blur(14px);

position:relative;

overflow:hidden;

}

.card::before{

content:"";

position:absolute;

width:140px;
height:140px;

background:
rgba(255,102,0,0.12);

border-radius:50%;

top:-40px;
right:-40px;

}

.card i{

font-size:34px;

color:#ff6600;

margin-bottom:15px;

}

.card h2{

font-size:32px;

}

.card p{

color:#bbb;

margin-top:8px;

}

/* =========================
   CHARTS
========================= */

.charts{

display:grid;

grid-template-columns:
2fr 1fr;

gap:20px;

margin-bottom:25px;

}

.chart-box{

background:
rgba(255,255,255,0.06);

border-radius:22px;

padding:25px;

height:320px;

position:relative;

overflow:hidden;

}

.fake-chart{

position:absolute;

bottom:25px;
left:25px;
right:25px;

display:flex;
align-items:flex-end;
gap:18px;

height:180px;

}

.bar{

flex:1;

border-radius:12px 12px 0 0;

background:
linear-gradient(
to top,
#ff6600,
#ff9900
);

animation:grow 1s ease;

}

.bar:nth-child(1){height:60%;}
.bar:nth-child(2){height:90%;}
.bar:nth-child(3){height:45%;}
.bar:nth-child(4){height:100%;}
.bar:nth-child(5){height:70%;}

@keyframes grow{

from{
height:0;
}

}

/* =========================
   PRODUCT TABLE
========================= */

.table-box{

background:
rgba(255,255,255,0.06);

border-radius:22px;

padding:20px;

}

table{

width:100%;

border-collapse:collapse;

}

th,td{

padding:16px;

text-align:left;

}

th{

color:#ff9900;

}

tr{

border-bottom:
1px solid rgba(255,255,255,0.05);

}

.product{

display:flex;
align-items:center;
gap:12px;

}

.product img{

width:55px;
height:55px;

border-radius:12px;

object-fit:cover;

}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
}

.charts{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
EMARKET
</div>

<div class="menu">

<button onclick="showSection('dashboard')">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</button>

<button onclick="showSection('products')">
<i class="fa-solid fa-box"></i>
Products
</button>

<button onclick="showSection('customers')">
<i class="fa-solid fa-users"></i>
Customers
</button>

<button onclick="showSection('orders')">
<i class="fa-solid fa-cart-shopping"></i>
Orders
</button>

<button onclick="showSection('payments')">
<i class="fa-solid fa-wallet"></i>
Payments
</button>

<button onclick="showSection('settings')">
<i class="fa-solid fa-gear"></i>
Settings
</button>

</div>
</div>

<!-- MAIN -->

<div class="main" id="mainContent">

<div class="topbar">

<h1>
Admin Dashboard
</h1>

<div class="admin-user">

<i class="fa-solid fa-user"></i>

Admin

</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">

<i class="fa-solid fa-box"></i>

<h2 id="adminProducts">0</h2>

<p>Total Products</p>

</div>

<div class="card">

<i class="fa-solid fa-users"></i>

<h2>12K</h2>

<p>Total Users</p>

</div>

<div class="card">

<i class="fa-solid fa-dollar-sign"></i>

<h2>$48K</h2>

<p>Total Revenue</p>

</div>

<div class="card">

<i class="fa-solid fa-cart-shopping"></i>

<h2>3,420</h2>

<p>Total Orders</p>

</div>

</div>

<!-- CHARTS -->

<div class="charts">

<div class="chart-box">

<h2>
Sales Analytics
</h2>

<div class="fake-chart">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<div class="chart-box">

<h2>
Traffic
</h2>

<br>

<h1 style="font-size:60px;color:#ff6600;">
89%
</h1>

<p>
Site growth this month
</p>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<h2 style="margin-bottom:20px;">
Recent Products
</h2>

<table>

<thead>

<tr>

<th>Product</th>
<th>Price</th>
<th>Status</th>

</tr>

</thead>

<tbody id="adminProductList">

</tbody>

</table>

</div>

</div>

<script>

const products =
JSON.parse(localStorage.getItem("products")) || [];

document.getElementById(
"adminProducts"
).innerText = products.length;

const list =
document.getElementById("adminProductList");

products.slice(0,8).forEach(product=>{

list.innerHTML += `

<tr>

<td>

<div class="product">

<img src="${product.image}">

${product.name}

</div>

</td>

<td>

$${product.price}

</td>

<td style="color:lime;">

Active

</td>

</tr>

`;

});
/* =========================
   ADMIN MENU SYSTEM
========================= */

function showSection(section) {

const main =
document.getElementById("mainContent");

if(section === "dashboard") {

location.reload();

}

else if(section === "products") {

main.innerHTML = `

<h1 style="margin-bottom:25px;">
📦 Products Management
</h1>

<div class="table-box">

<table>

<thead>

<tr>

<th>Product</th>
<th>Price</th>
<th>Status</th>

</tr>

</thead>

<tbody id="productsTable">

</tbody>

</table>

</div>

`;

const table =
document.getElementById("productsTable");

const products =
JSON.parse(localStorage.getItem("products")) || [];

products.forEach(product=>{

table.innerHTML += `

<tr>

<td>

<div class="product">

<img src="${product.image}">

${product.name}

</div>

</td>

<td>$${product.price}</td>

<td style="color:lime;">
Active
</td>

</tr>

`;

});

}

else if(section === "customers") {

main.innerHTML = `

<h1 style="margin-bottom:25px;">
👥 Customers
</h1>

<div class="stats">

<div class="card">

<i class="fa-solid fa-users"></i>

<h2>12,420</h2>

<p>Registered Users</p>

</div>

<div class="card">

<i class="fa-solid fa-user-check"></i>

<h2>8,940</h2>

<p>Active Buyers</p>

</div>

</div>

`;

}

else if(section === "orders") {

main.innerHTML = `

<h1 style="margin-bottom:25px;">
🛒 Orders
</h1>

<div class="table-box">

<table>

<tr>

<th>Order ID</th>
<th>Status</th>
<th>Amount</th>

</tr>

<tr>

<td>#EM1022</td>
<td style="color:orange;">Pending</td>
<td>$240</td>

</tr>

<tr>

<td>#EM1023</td>
<td style="color:lime;">Completed</td>
<td>$790</td>

</tr>

<tr>

<td>#EM1024</td>
<td style="color:red;">Cancelled</td>
<td>$110</td>

</tr>

</table>

</div>

`;

}

else if(section === "payments") {

main.innerHTML = `

<h1 style="margin-bottom:25px;">
💳 Payments
</h1>

<div class="stats">

<div class="card">

<i class="fa-solid fa-dollar-sign"></i>

<h2>$48,920</h2>

<p>Total Revenue</p>

</div>

<div class="card">

<i class="fa-solid fa-wallet"></i>

<h2>$8,400</h2>

<p>Pending Payments</p>

</div>

</div>

`;

}

else if(section === "settings") {

main.innerHTML = `

<h1 style="margin-bottom:25px;">
⚙ Settings
</h1>

<div class="table-box">

<p style="margin-bottom:20px;">
Admin Controls
</p>

<button>
Change Password
</button>

<br><br>

<button>
Manage Sellers
</button>

<br><br>

<button>
Platform Settings
</button>

</div>

`;

}

}
</script>

</body>
</html>
