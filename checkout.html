<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
EMARKET Checkout
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* =========================
   BODY
========================= */

body{

margin:0;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#050505,
#101820,
#181818
);

color:white;

padding:40px;

display:flex;

justify-content:center;

}

/* =========================
   CHECKOUT BOX
========================= */

.checkout-box{

width:900px;

max-width:100%;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.08);

backdrop-filter: blur(14px);

padding:35px;

border-radius:25px;

box-shadow:
0 20px 60px rgba(0,0,0,0.5);

}

/* =========================
   TITLE
========================= */

h1{

margin-top:0;

color:#ff6600;

font-size:36px;

}

/* =========================
   PRODUCT CARD
========================= */

.product-preview{

display:flex;

gap:20px;

align-items:center;

background:
rgba(255,255,255,0.05);

padding:20px;

border-radius:18px;

margin-top:25px;

}

.product-preview img{

width:150px;

height:150px;

object-fit:cover;

border-radius:18px;

}

.product-info h2{

margin:0;

}

.price{

margin-top:10px;

font-size:26px;

font-weight:bold;

color:#ff9900;

}

/* =========================
   PAYMENT OPTIONS
========================= */

.payment-options{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:18px;

margin-top:35px;

}

.payment-card{

background:
rgba(255,255,255,0.05);

border:
2px solid transparent;

padding:20px;

border-radius:18px;

cursor:pointer;

transition:0.3s;

text-align:center;

}

.payment-card:hover{

transform:translateY(-5px);

border-color:#ff6600;

}

.payment-card.active{

border-color:#ff6600;

background:
rgba(255,102,0,0.12);

}

.payment-card img{

width:70px;

height:70px;

object-fit:contain;

margin-bottom:12px;

}

.payment-card h3{

margin:0;

}

/* =========================
   PAYMENT DETAILS
========================= */

.payment-details{

margin-top:30px;

background:
rgba(255,255,255,0.05);

padding:25px;

border-radius:18px;

line-height:1.9;

}

/* =========================
   CARD FORM
========================= */

.card-form{

display:none;

margin-top:20px;

}

.card-form input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:12px;

background:
rgba(255,255,255,0.08);

color:white;

outline:none;

}

/* =========================
   PAY BUTTON
========================= */

button{

width:100%;

margin-top:30px;

padding:16px;

border:none;

border-radius:14px;

background:
linear-gradient(
to right,
#ff6600,
#ff9900
);

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

body{

padding:20px;

}

.product-preview{

flex-direction:column;

text-align:center;

}

}

</style>

</head>

<body>

<div class="checkout-box">

<h1>
Secure Checkout
</h1>

<!-- PRODUCT -->

<div class="product-preview">

<img
id="productImage"
src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<div class="product-info">

<h2 id="productName">
Product
</h2>

<div class="price">

$
<span id="productPrice">
0
</span>

</div>

<p>
Fast delivery • Secure payment • Verified seller
</p>

</div>

</div>

<!-- PAYMENT OPTIONS -->

<h2 style="margin-top:40px;">
Choose Payment Method
</h2>

<div class="payment-options">
<div
class="payment-card"
onclick="selectPayment('ecocash',this)">

<img
src="https://play-lh.googleusercontent.com/Sdry22WYlYtLI5rnkZnBEyKSYLihgm21MC9iQN7UA-AKHtF2kQ2hhnASBhQRVj49qcc">

<h3>
EcoCash
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('innbucks',this)">

<img
src="https://play-lh.googleusercontent.com/khUk59Xiv74inlv-B__9dz2A9k5iUM3_24ZorFd51ogP7APtxXiuwNF_kuT9lNcOJg">

<h3>
Innbucks
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('visa',this)">

<img
src="https://upload.wikimedia.org/wikipedia/commons/9/98/Visa_Inc._logo_%282005%E2%80%932014%29.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original">

<h3>
Visa
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('mastercard',this)">

<img
src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">

<h3>
Mastercard
</h3>

</div>


</div>

<!-- DETAILS -->

<div
class="payment-details"
id="paymentDetails">

Please select a payment method above.

</div>

<!-- CARD FORM -->

<div
class="card-form"
id="cardForm">

<input
type="text"
placeholder="Card Holder Name">

<input
type="text"
placeholder="Card Number">

<input
type="text"
placeholder="Expiry Date">

<input
type="text"
placeholder="CVV">

</div>

<button onclick="pay()">

Complete Payment

</button>

</div>

<script>

/* =========================
   LOAD CHECKOUT CART
========================= */

let checkoutCart =
JSON.parse(
localStorage.getItem(
"checkoutCart"
)
) || [];

let checkoutTotal = 0;

let selectedPayment = "";

/* CREATE PRODUCT LIST */

function loadCheckoutProducts(){

const productBox =
document.querySelector(
".product-preview"
);

if(!productBox) return;

productBox.innerHTML = "";

checkoutTotal = 0;

if(checkoutCart.length === 0){

productBox.innerHTML = `

<div style="
width:100%;
text-align:center;
padding:30px;
">

<h2>
Cart Empty
</h2>

<p>
No products selected.
</p>

</div>

`;

return;

}

checkoutCart.forEach(item=>{

const subtotal =
item.price * item.qty;

checkoutTotal += subtotal;

productBox.innerHTML += `

<div style="
display:flex;
gap:20px;
margin-bottom:20px;
align-items:center;
">

<img
src="${item.image}"
style="
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
">

<div>

<h3>
${item.name}
</h3>

<p>
Price: $${item.price}
</p>

<p>
Qty: ${item.qty}
</p>

<p>
Subtotal: $${subtotal}
</p>

</div>

</div>

`;

});

productBox.innerHTML += `

<hr>

<h2 style="
color:#ff9900;
">

TOTAL:
$${checkoutTotal.toFixed(2)}

</h2>

`;

}

loadCheckoutProducts();

/* =========================
   PAYMENT SELECT
========================= */

function selectPayment(type,el){

selectedPayment = type;

document
.querySelectorAll(".payment-card")
.forEach(card=>{

card.classList.remove("active");

});

el.classList.add("active");

const details =
document.getElementById(
"paymentDetails"
);

const cardForm =
document.getElementById(
"cardForm"
);

cardForm.style.display =
"none";

if(type==="ecocash"){

details.innerHTML = `

<h2 style="color:#00d757;">
Pay with EcoCash
</h2>

<p>

Dial:

<strong>

*151*2*2*59821*${checkoutTotal}#

</strong>

</p>

`;

}

else if(type==="innbucks"){

details.innerHTML = `

<h2 style="color:#ffcc00;">
Pay with Innbucks
</h2>

<p>

Merchant Code:

<strong>
EMARKET248
</strong>

</p>

`;

}

else if(type==="visa"){

details.innerHTML = `

<h2 style="color:#1a73e8;">
Visa Payment
</h2>

<p>
Enter Visa details below.
</p>

`;

cardForm.style.display =
"block";

}

else if(type==="mastercard"){

details.innerHTML = `

<h2 style="color:#ff6600;">
Mastercard Payment
</h2>

<p>
Enter Mastercard details below.
</p>

`;

cardForm.style.display =
"block";

}

}

/* =========================
   COMPLETE PAYMENT
========================= */

function pay(){

if(checkoutCart.length===0){

alert(
"Cart is empty"
);

return;

}

if(!selectedPayment){

alert(
"Please select payment method"
);

return;

}

const receiptNumber =

"EM" +

Math.floor(
100000 +
Math.random()*900000
);

const receipt = {

receiptNumber,

paymentMethod:
selectedPayment,

products:
checkoutCart,

total:
checkoutTotal,

date:
new Date()
.toLocaleString()

};

localStorage.setItem(

"lastReceipt",

JSON.stringify(receipt)

);

localStorage.removeItem(
"cart"
);

localStorage.removeItem(
"checkoutCart"
);

alert(

"Payment Successful ✅\n\nReceipt: " +

receiptNumber

);

window.location.href =
"receipt.html";

}

</script>

<script src="script.js?v=99"></script>
</body>
</html>
