<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMARKET Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #050505);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* MAIN LAYOUT */
.checkout-container {
  width: 90%;
  max-width: 1100px;
  display: flex;
  gap: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* LEFT SIDE */
.summary {
  flex: 1;
  padding: 30px;
  background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
}

.summary h2 {
  margin-bottom: 20px;
}

.product-box {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 18px;
  margin-bottom: 20px;
}

.product-box img {
  width: 100%;
  border-radius: 12px;
}

.price {
  font-size: 22px;
  color: #ff9900;
  margin-top: 10px;
}

/* RIGHT SIDE */
.payment {
  flex: 1;
  padding: 30px;
  background: linear-gradient(145deg, #101820, #0b0b0b);
}

.payment h2 {
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(to right, #ff6600, #ff9900);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px rgba(255,102,0,0.4);
}

/* BADGES */
.badges {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.8;
}

.badge {
  padding: 5px 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
}

</style>
</head>

<body>

<div class="checkout-container">

  <!-- LEFT -->
  <div class="summary">

    <h2>Order Summary</h2>

    <div class="product-box">

      <img id="productImage" src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8">

      <h3 id="productName">Sample Product</h3>

      <p class="price" id="productPrice">$0.00</p>

    </div>

    <p>✔ Fast Delivery</p>
    <p>✔ Verified Seller</p>
    <p>✔ Secure Payment</p>

    <div class="badges">
      <div class="badge">Visa</div>
      <div class="badge">Mastercard</div>
      <div class="badge">EcoCash</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="payment">

    <h2>Payment Details</h2>

    <input type="text" placeholder="Full Name">

    <input type="text" placeholder="Card Number">

    <input type="text" placeholder="Expiry Date">

    <input type="text" placeholder="CVV">

    <select>
      <option>Visa / Mastercard</option>
      <option>EcoCash</option>
      <option>Innbucks</option>
    </select>

    <button onclick="payNow()">Pay Now</button>

  </div>

</div>

<script>

function payNow() {
  alert("Payment Successful ✅");
  window.location.href = "receipt.html";
}

</script>

</body>
</html>
