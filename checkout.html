<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
EMARKET Checkout
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* =========================
   BODY
========================= */

body{

margin:0;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#050505,
#101820,
#181818
);

color:white;

padding:40px;

display:flex;

justify-content:center;

}

/* =========================
   CHECKOUT BOX
========================= */

.checkout-box{

width:900px;

max-width:100%;

background:
rgba(255,255,255,0.06);

border:
1px solid rgba(255,255,255,0.08);

backdrop-filter: blur(14px);

padding:35px;

border-radius:25px;

box-shadow:
0 20px 60px rgba(0,0,0,0.5);

}

/* =========================
   TITLE
========================= */

h1{

margin-top:0;

color:#ff6600;

font-size:36px;

}

/* =========================
   PRODUCT CARD
========================= */

.product-preview{

display:flex;

gap:20px;

align-items:center;

background:
rgba(255,255,255,0.05);

padding:20px;

border-radius:18px;

margin-top:25px;

}

.product-preview img{

width:150px;

height:150px;

object-fit:cover;

border-radius:18px;

}

.product-info h2{

margin:0;

}

.price{

margin-top:10px;

font-size:26px;

font-weight:bold;

color:#ff9900;

}

/* =========================
   PAYMENT OPTIONS
========================= */

.payment-options{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:18px;

margin-top:35px;

}

.payment-card{

background:
rgba(255,255,255,0.05);

border:
2px solid transparent;

padding:20px;

border-radius:18px;

cursor:pointer;

transition:0.3s;

text-align:center;

}

.payment-card:hover{

transform:translateY(-5px);

border-color:#ff6600;

}

.payment-card.active{

border-color:#ff6600;

background:
rgba(255,102,0,0.12);

}

.payment-card img{

width:70px;

height:70px;

object-fit:contain;

margin-bottom:12px;

}

.payment-card h3{

margin:0;

}

/* =========================
   PAYMENT DETAILS
========================= */

.payment-details{

margin-top:30px;

background:
rgba(255,255,255,0.05);

padding:25px;

border-radius:18px;

line-height:1.9;

}

/* =========================
   CARD FORM
========================= */

.card-form{

display:none;

margin-top:20px;

}

.card-form input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:12px;

background:
rgba(255,255,255,0.08);

color:white;

outline:none;

}

/* =========================
   PAY BUTTON
========================= */

button{

width:100%;

margin-top:30px;

padding:16px;

border:none;

border-radius:14px;

background:
linear-gradient(
to right,
#ff6600,
#ff9900
);

color:white;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

body{

padding:20px;

}

.product-preview{

flex-direction:column;

text-align:center;

}

}

</style>

</head>

<body>

<div class="checkout-box">

<h1>
Secure Checkout
</h1>

<!-- PRODUCT -->

<div class="product-preview">

<img
id="productImage"
src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<div class="product-info">

<h2 id="productName">
Product
</h2>

<div class="price">

$
<span id="productPrice">
0
</span>

</div>

<p>
Fast delivery • Secure payment • Verified seller
</p>

</div>

</div>

<!-- PAYMENT OPTIONS -->

<h2 style="margin-top:40px;">
Choose Payment Method
</h2>

<div class="payment-options">
<div
class="payment-card"
onclick="selectPayment('ecocash',this)">

<img
src="https://play-lh.googleusercontent.com/Sdry22WYlYtLI5rnkZnBEyKSYLihgm21MC9iQN7UA-AKHtF2kQ2hhnASBhQRVj49qcc">

<h3>
EcoCash
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('innbucks',this)">

<img
src="https://play-lh.googleusercontent.com/khUk59Xiv74inlv-B__9dz2A9k5iUM3_24ZorFd51ogP7APtxXiuwNF_kuT9lNcOJg">

<h3>
Innbucks
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('visa',this)">

<img
src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png">

<h3>
Visa
</h3>

</div>

<div
class="payment-card"
onclick="selectPayment('mastercard',this)">

<img
src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">

<h3>
Mastercard
</h3>

</div>


</div>

<!-- DETAILS -->

<div
class="payment-details"
id="paymentDetails">

Please select a payment method above.

</div>

<!-- CARD FORM -->

<div
class="card-form"
id="cardForm">

<input
type="text"
placeholder="Card Holder Name">

<input
type="text"
placeholder="Card Number">

<input
type="text"
placeholder="Expiry Date">

<input
type="text"
placeholder="CVV">

</div>

<button onclick="pay()">

Complete Payment

</button>

</div>

<script>

/* =========================
   LOAD PRODUCT
========================= */

const order =
JSON.parse(
localStorage.getItem("currentOrder")
);

if(order){

document.getElementById(
"productName"
).innerText =
order.product;

document.getElementById(
"productPrice"
).innerText =
order.price;

}

/* =========================
   PAYMENT SELECT
========================= */

let selectedPayment = "";

function selectPayment(type,el){

selectedPayment = type;

/* ACTIVE */

document
.querySelectorAll(".payment-card")
.forEach(card=>{

card.classList.remove("active");

});

el.classList.add("active");

/* DETAILS */

const details =
document.getElementById(
"paymentDetails"
);

const cardForm =
document.getElementById(
"cardForm"
);

cardForm.style.display =
"none";

if(type === "ecocash"){

details.innerHTML = `

<h2 style="color:#00d757;">
Pay with EcoCash
</h2>

<p>

Dial:

<strong>

*151*2*2*59821*${order.price}#

</strong>

</p>

<p>

or use the EcoCash App.

</p>

<p>

Live life the EcoCash Way!

</p>

`;

}

else if(type === "innbucks"){

details.innerHTML = `

<h2 style="color:#ffcc00;">
Pay with Innbucks
</h2>

<p>

Open your Innbucks App.

</p>

<p>

Send payment to merchant code:

<strong>

EMARKET248

</strong>

</p>

<p>

Fast • Safe • Instant

</p>

`;

}

else if(type === "visa"){

details.innerHTML = `

<h2 style="color:#1a73e8;">
Visa Payment
</h2>

<p>

Enter your Visa card details below.

</p>

`;

cardForm.style.display =
"block";

}

else if(type === "mastercard"){

details.innerHTML = `

<h2 style="color:#ff6600;">
Mastercard Payment
</h2>

<p>

Enter your Mastercard details below.

</p>

`;

cardForm.style.display =
"block";

}

}

</script>

<script src="script.js?v=99"></script>

</body>
</html>
