<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Dashboard</title>
</head>

<body>

<div class="dashboard glass-card fade-in">

  <h2>Seller Dashboard</h2>

  <button onclick="logoutSeller()">Logout</button>

  <h3>📊 Stats</h3>
  <p id="totalProducts">Products: 0</p>

  <h3>Add Product</h3>

  <input type="text" id="pName" placeholder="Product Name">
  <input type="text" id="pPrice" placeholder="Price">
  <input type="text" id="pImage" placeholder="Image URL">

  <select id="pCategory">
    <option value="bikes">Bikes</option>
    <option value="electronics">Electronics</option>
  </select>

  <button onclick="addProduct()">Upload Product</button>

  <h3>Upload Reel</h3>

  <input type="text" id="reelUrl" placeholder="Video URL">
  <button onclick="addReel()">Upload Reel</button>

</div>

<script src="script.js"></script>

</body>
</html>
