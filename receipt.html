<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
EMARKET Receipt
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* =========================
   BODY
========================= */

body{

margin:0;

padding:40px;

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#050505,
#101820,
#181818
);

color:white;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

/* =========================
   RECEIPT CARD
========================= */

.receipt{

width:700px;

max-width:100%;

background:
rgba(255,255,255,0.06);

backdrop-filter: blur(14px);

border:
1px solid rgba(255,255,255,0.08);

padding:35px;

border-radius:24px;

box-shadow:
0 20px 60px rgba(0,0,0,0.6);

}

/* =========================
   HEADER
========================= */

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding-bottom:20px;

border-bottom:
1px solid rgba(255,255,255,0.08);

margin-bottom:25px;

}

.logo{

font-size:32px;

font-weight:700;

color:#ff6600;

text-shadow:
0 0 20px rgba(255,102,0,0.5);

}

.meta{

text-align:right;

font-size:14px;

color:#ccc;

line-height:1.8;

}

/* =========================
   INFO
========================= */

.info{

display:flex;

justify-content:space-between;

gap:20px;

margin-bottom:30px;

flex-wrap:wrap;

}

.info-box{

background:
rgba(255,255,255,0.05);

padding:18px;

border-radius:16px;

flex:1;

min-width:220px;

}

.info-box strong{

display:block;

margin-bottom:8px;

color:#ff9900;

}

/* =========================
   TABLE
========================= */

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:16px;

}

thead{

background:
rgba(255,102,0,0.15);

}

th{

padding:16px;

text-align:left;

font-size:15px;

color:#ff9900;

}

td{

padding:16px;

border-bottom:
1px solid rgba(255,255,255,0.08);

}

/* =========================
   TOTAL
========================= */

.total-box{

margin-top:25px;

display:flex;

justify-content:flex-end;

}

.total{

background:
linear-gradient(
to right,
#ff6600,
#ff9900
);

padding:18px 28px;

border-radius:16px;

font-size:24px;

font-weight:700;

box-shadow:
0 0 25px rgba(255,102,0,0.4);

}

/* =========================
   STATUS
========================= */

.status{

display:inline-block;

margin-top:18px;

padding:10px 18px;

border-radius:40px;

background:
rgba(0,255,100,0.15);

color:lime;

font-weight:600;

}

/* =========================
   BUTTON
========================= */

button{

margin-top:30px;

width:100%;

padding:16px;

border:none;

border-radius:14px;

background:
linear-gradient(
to right,
#ff6600,
#ff9900
);

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.02);

box-shadow:
0 0 25px rgba(255,102,0,0.35);

}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

body{

padding:20px;

}

.receipt{

padding:22px;

}

.logo{

font-size:24px;

}

th,
td{

font-size:13px;

padding:12px;

}

.total{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="receipt">

<!-- HEADER -->

<div class="header">

<div class="logo">
EMARKET
</div>

<div class="meta">

Receipt No:
<span id="receiptNo"></span>

<br>

Date:
<span id="date"></span>

</div>

</div>

<!-- INFO -->

<div class="info">

<div class="info-box">

<strong>
Customer
</strong>

<span id="customer">
Guest User
</span>

</div>

<div class="info-box">

<strong>
Payment Method
</strong>

Card / EcoCash

</div>

</div>

<!-- TABLE -->

<table>

<thead>

<tr>

<th>
Product
</th>

<th>
Qty
</th>

<th>
Price
</th>

</tr>

</thead>

<tbody id="items">

</tbody>

</table>

<!-- TOTAL -->

<div class="total-box">

<div class="total">

Total:
$
<span id="total">
0
</span>

</div>

</div>

<!-- STATUS -->

<div class="status">

✅ Payment Successful

</div>

<!-- BUTTON -->

<button onclick="window.print()">

Print Receipt

</button>

</div>

<script>

/* =========================
   LOAD RECEIPT
========================= */

function loadReceipt(){

const receipt =
JSON.parse(
localStorage.getItem("receipt")
);

if(!receipt){

alert("No receipt found");

return;

}

/* HEADER */

document.getElementById(
"receiptNo"
).innerText =
receipt.orderId;

document.getElementById(
"date"
).innerText =
receipt.paymentDate;

/* CUSTOMER */

document.getElementById(
"customer"
).innerText =
receipt.buyer;

/* ITEMS */

const items =
document.getElementById(
"items"
);

items.innerHTML = `

<tr>

<td>
${receipt.product}
</td>

<td>
1
</td>

<td>
$${receipt.price}
</td>

</tr>

`;

/* TOTAL */

document.getElementById(
"total"
).innerText =
receipt.price;

}

/* INIT */

loadReceipt();

</script>

</body>
</html>
