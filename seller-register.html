<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seller Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">
  <h2>Seller Registration</h2>

  <input type="text" id="sName" placeholder="Full Name">
  <input type="text" id="shopName" placeholder="Shop Name">
  <input type="text" id="residence" placeholder="Residence">
  <input type="text" id="nationalId" placeholder="National ID">
  <input type="text" id="category" placeholder="Product Category">

  <button onclick="registerSeller()">Register Shop</button>

  <p>Already a seller? <a href="seller-login.html">Login</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
